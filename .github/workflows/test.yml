name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # The lockfile was generated on macOS, so it doesn't list
      # `@rollup/rollup-linux-x64-gnu` (the platform-specific optional dep
      # vitest's rollup requires) — npm bug 4828. Both `npm ci` and `npm
      # install` honor the existing lockfile, so we remove it first to force
      # a fresh resolve on the Linux runner.
      - run: rm -f package-lock.json && npm install

      - name: Type check
        run: npm run check-types

      - name: Unit tests (vitest)
        run: npm test

      - name: Benchmark (14 synthetic fixtures)
        run: npm run benchmark

      - name: Matrix (6 project shapes, cold tarball install)
        run: npm run matrix
